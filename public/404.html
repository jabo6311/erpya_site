<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>ERPyA</title>
    <script>
      // Redirige rutas de SPA a index.html preservando el path en dominio raíz.
      (function() {
        var l = window.location;
        var path = l.pathname.replace(/^\/+/, '').replace(/&/g, '~and~');
        var query = l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '';

        l.replace(l.origin + '/?p=' + path + query + l.hash);
      })();
    </script>
  </head>
  <body></body>
</html>
